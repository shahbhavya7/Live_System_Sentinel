syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.sentinel.grpc";
option java_outer_classname = "MonitorProto";

package monitor;

// Trigger to start the stream
message MonitorRequest {
    string agent_id = 1;
}

// The core health metrics
message SystemStats {
    double cpu_percent = 1;      
    int64 memory_used_mb = 2;   
    int64 memory_total_mb = 3;  
    int32 active_threads = 4;   
    int64 timestamp = 5;        
}

// The Alert message for the Security Brain
message Alert {
    string severity = 1; // "INFO", "WARNING", "CRITICAL"
    string message = 2;
    int64 timestamp = 3;
}

service SentinelService {
    // Member 1 (Agent) calls this to stream data TO Member 2 (Server)
    rpc StreamStats(stream SystemStats) returns (Alert);
    
    // Member 4 (UI) calls this to receive live data FROM Member 2 (Server)
    rpc SubscribeToDashboard(MonitorRequest) returns (stream SystemStats);
}